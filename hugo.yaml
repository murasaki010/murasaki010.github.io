baseURL: "https://murasaki010.github.io/"
locale: zh-cn
title: "Yukari's Blog"
theme: "PaperMod"

# PaperMod 配置
params:
  profileMode:
    enabled: true
    title: "Hi, I'm Yukari"
    subtitle: "Tsinghua Math · AI"
    imageUrl: "/avatar.jpg"
    imageTitle: "Yukari"
    imageWidth: 160
    imageHeight: 160
    buttons:
      - name: 归档
        url: /archives/
      - name: 搜索
        url: /search/
  socialIcons:
    - name: github
      url: "https://github.com/murasaki010"

menu:
  main:
    - identifier: archives
      name: 归档
      url: /archives/
      weight: 10
    - identifier: search
      name: 搜索
      url: /search/
      weight: 20
    - identifier: tags
      name: 标签
      url: /tags/
      weight: 30

# 输出 HTML 和 JSON（搜索需要）
outputs:
  home:
    - HTML
    - RSS
    - JSON
